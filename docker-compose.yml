version: "3.8"

services:
  # PostgreSQLデータベース
  postgres:
    image: postgres:16
    container_name: prezen-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prezen_db}
      POSTGRES_USER: ${POSTGRES_USER:-prezen_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prezen_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - prezen-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prezen_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: prezen-backend
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-prezen_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-prezen_password}
      DATABASE_NAME: ${POSTGRES_DB:-prezen_db}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1d}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - prezen-network
    restart: unless-stopped
    command: npm run start:dev

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: prezen-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - prezen-network
    restart: unless-stopped
    command: npm run dev

# ボリューム定義
volumes:
  postgres-data:
    driver: local

# ネットワーク定義
networks:
  prezen-network:
    driver: bridge
